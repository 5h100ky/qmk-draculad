name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Clone vial-qmk
        run: |
          git clone --depth 1 \
            --recurse-submodules \
            --shallow-submodules \
            https://github.com/vial-kb/vial-qmk.git vial-qmk

      - name: Install QMK CLI and Python dependencies
        working-directory: vial-qmk
        run: |
          pip install qmk
          pip install -r requirements.txt

      - name: Configure QMK home
        working-directory: vial-qmk
        run: qmk config user.qmk_home=$(pwd)

      - name: Copy keyboard files
        run: |
          # QMK 폴더명 규칙: 언더스코어만 허용 (하이픈 불가)
          mkdir -p vial-qmk/keyboards/5h100ky/dracula/qmk_draculad
          cp -r config.h keyboard.json rules.mk keymaps \
            vial-qmk/keyboards/5h100ky/dracula/qmk_draculad/

      - name: Build firmware
        working-directory: vial-qmk
        run: qmk compile -kb 5h100ky/dracula/qmk_draculad -km vial

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: draculad-rp2040-vial
          path: vial-qmk/*.uf2
          if-no-files-found: error
